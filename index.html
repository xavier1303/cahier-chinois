<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>夏天去中国 — Carnet de voyage</title>
<style>
:root{
  --paper:#F7F1E3;
  --paper-dark:#EFE6D2;
  --ink:#1F2B24;
  --ink-soft:#4A5750;
  --seal:#C23B3B;
  --seal-dark:#9C2B2B;
  --tea:#5C7A5C;
  --tea-dark:#3F5A40;
  --amber:#D9A441;
  --amber-dark:#B5822E;
  --line:#D8CBA8;
  --shadow:0 4px 14px rgba(31,43,36,0.12);
  --radius:14px;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}

body{
  background:var(--paper);
  background-image:
    radial-gradient(circle at 15% 8%, rgba(92,122,92,0.05), transparent 40%),
    radial-gradient(circle at 85% 92%, rgba(194,59,59,0.05), transparent 40%);
  color:var(--ink);
  font-family:'Source Han','Noto Sans SC','PingFang SC',-apple-system,system-ui,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

@font-face{
  font-family:'DisplaySerif';
  src:local('Songti SC'), local('STSong'), local('Noto Serif SC');
}

.app{
  max-width:560px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
  display:flex;
  flex-direction:column;
}

/* ---------- Typography ---------- */
h1,h2,h3,.display{
  font-family:'Noto Serif SC','Songti SC',serif;
  font-weight:700;
  letter-spacing:0.01em;
}
.hanzi{
  font-family:'Noto Sans SC','PingFang SC',sans-serif;
}
.pinyin{
  font-family:'Courier New',monospace;
  color:var(--ink-soft);
  font-size:0.85em;
}

/* ---------- Screens ---------- */
.screen{
  flex:1;
  display:none;
  flex-direction:column;
  animation:fadeIn 0.25s ease;
}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion:reduce){
  .screen{animation:none;}
  *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
}

/* ---------- Top bar ---------- */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 20px 10px;
  position:sticky;
  top:0;
  background:var(--paper);
  z-index:10;
  border-bottom:1px solid var(--line);
}
.topbar .back-btn{
  background:none;border:none;color:var(--ink);font-size:1.5rem;
  cursor:pointer;padding:4px 8px;line-height:1;
}
.topbar .title{
  font-size:1.05rem;
  text-align:center;
  flex:1;
}
.topbar .score-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--amber);
  color:#3A2A0A;
  padding:5px 11px;
  border-radius:999px;
  font-weight:700;
  font-size:0.85rem;
  white-space:nowrap;
}

/* ---------- Login screen ---------- */
#screen-login{justify-content:center;padding:24px;}
.login-hero{
  text-align:center;
  margin-bottom:28px;
}
.login-hero .stamp{
  width:88px;height:88px;
  margin:0 auto 18px;
  border:3px solid var(--seal);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  transform:rotate(-4deg);
  color:var(--seal);
  font-size:2.6rem;
  font-family:'Noto Serif SC',serif;
}
.login-hero h1{
  font-size:1.9rem;
  margin:0 0 6px;
  color:var(--ink);
}
.login-hero p{
  color:var(--ink-soft);
  margin:0;
  font-size:0.95rem;
}
.login-card{
  background:var(--paper-dark);
  border-radius:var(--radius);
  padding:22px;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
}
.field{margin-bottom:14px;}
.field label{
  display:block;
  font-size:0.8rem;
  color:var(--ink-soft);
  margin-bottom:5px;
  font-weight:600;
}
.field input{
  width:100%;
  padding:12px 14px;
  border:1.5px solid var(--line);
  border-radius:10px;
  background:var(--paper);
  font-size:1rem;
  color:var(--ink);
  font-family:inherit;
}
.field input:focus{
  outline:2px solid var(--tea);
  outline-offset:1px;
  border-color:var(--tea);
}
.btn{
  display:block;
  width:100%;
  padding:13px;
  border-radius:10px;
  border:none;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  text-align:center;
}
.btn:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}
.btn-primary{background:var(--seal); color:#FFF6EC;}
.btn-primary:active{background:var(--seal-dark);}
.btn-secondary{background:transparent; color:var(--tea-dark); border:1.5px solid var(--tea); margin-top:10px;}
.btn-ghost{background:none; color:var(--ink-soft); font-size:0.85rem; text-decoration:underline; padding:8px;}
.login-error{
  color:var(--seal-dark);
  font-size:0.85rem;
  margin-top:8px;
  min-height:1.2em;
}
.login-toggle{
  text-align:center;
  margin-top:16px;
  font-size:0.88rem;
  color:var(--ink-soft);
}
.login-toggle button{
  background:none;border:none;color:var(--tea-dark);font-weight:700;cursor:pointer;font-size:0.88rem;text-decoration:underline;
}

/* ---------- Home screen ---------- */
#screen-home .home-header{
  padding:20px 20px 8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.greeting{
  font-size:1.3rem;
}
.greeting .hanzi{color:var(--seal);}
.icon-btn{
  background:none;border:none;color:var(--ink-soft);font-size:1.4rem;cursor:pointer;padding:6px;
}
.stats-row{
  display:flex;
  gap:10px;
  padding:6px 20px 18px;
}
.stat-card{
  flex:1;
  background:var(--paper-dark);
  border-radius:12px;
  padding:14px 12px;
  text-align:center;
  border:1px solid var(--line);
}
.stat-card .num{
  font-size:1.5rem;
  font-weight:800;
  color:var(--seal);
  display:block;
  font-family:'Noto Serif SC',serif;
}
.stat-card .lbl{
  font-size:0.72rem;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:0.04em;
}

.section-label{
  padding:4px 20px;
  font-size:0.78rem;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--ink-soft);
  font-weight:700;
  margin-top:10px;
}

.mode-cards{
  padding:8px 20px 20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.mode-card{
  background:var(--paper-dark);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
  box-shadow:var(--shadow);
  text-align:left;
  width:100%;
  font-family:inherit;
}
.mode-card:active{transform:scale(0.985);}
.mode-card .ic{
  width:50px;height:50px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;
  flex-shrink:0;
}
.mode-card.tea .ic{background:#E3ECE3; color:var(--tea-dark);}
.mode-card.seal .ic{background:#F4DCDC; color:var(--seal-dark);}
.mode-card .txt h3{margin:0 0 3px; font-size:1.05rem;}
.mode-card .txt p{margin:0; font-size:0.83rem; color:var(--ink-soft);}

/* ---------- List screens (chapters / categories) ---------- */
.list-wrap{padding:14px 16px 24px;}
.list-item{
  background:var(--paper-dark);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  width:100%;
  text-align:left;
  font-family:inherit;
}
.list-item:active{transform:scale(0.99);}
.list-item .badge{
  width:38px;height:38px;
  border-radius:50%;
  background:var(--tea);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
  font-size:0.95rem;
  flex-shrink:0;
}
.list-item.done .badge{background:var(--amber);}
.list-item .info{flex:1;}
.list-item .info h4{margin:0 0 2px; font-size:0.98rem;}
.list-item .info .sub{font-size:0.8rem; color:var(--ink-soft);}
.list-item .progress-mini{
  font-size:0.75rem;
  color:var(--tea-dark);
  font-weight:700;
  white-space:nowrap;
}
.chip{
  display:inline-block;
  font-size:0.68rem;
  padding:2px 8px;
  border-radius:999px;
  background:var(--tea);
  color:#fff;
  font-weight:700;
  margin-left:6px;
  vertical-align:middle;
}

/* ---------- Exercise list within chapter ---------- */
.chapter-banner{
  padding:18px 20px;
  background:var(--paper-dark);
  border-bottom:1px solid var(--line);
  text-align:center;
}
.chapter-banner .hanzi{font-size:1.4rem; color:var(--seal); display:block; margin-bottom:2px;}
.chapter-banner .fr{font-size:0.9rem; color:var(--ink-soft);}

/* ---------- Exercise runner ---------- */
.runner{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:0 20px 24px;
}
.progress-track{
  height:6px;
  background:var(--line);
  border-radius:999px;
  margin:14px 0 22px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:var(--tea);
  border-radius:999px;
  transition:width 0.3s ease;
}
.q-counter{
  font-size:0.78rem;
  color:var(--ink-soft);
  text-align:center;
  margin-bottom:4px;
  font-weight:600;
}
.prompt-card{
  background:var(--paper-dark);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:28px 22px;
  text-align:center;
  margin-bottom:20px;
  min-height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.prompt-card .big-hanzi{
  font-size:2.6rem;
  line-height:1.3;
}
.prompt-card .sentence{
  font-size:1.5rem;
  line-height:1.6;
}
.prompt-card .meaning-prompt{
  font-size:1.05rem;
  color:var(--ink);
  line-height:1.5;
}

.options-grid{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.opt-btn{
  background:var(--paper);
  border:1.5px solid var(--line);
  border-radius:12px;
  padding:14px 16px;
  font-size:1rem;
  text-align:left;
  cursor:pointer;
  font-family:inherit;
  color:var(--ink);
}
.opt-btn:active{transform:scale(0.99);}
.opt-btn.correct{
  background:#E3ECE3;
  border-color:var(--tea);
  color:var(--tea-dark);
  font-weight:700;
}
.opt-btn.wrong{
  background:#F4DCDC;
  border-color:var(--seal);
  color:var(--seal-dark);
  font-weight:700;
}
.opt-btn:disabled{cursor:default;}

.input-area{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.input-area input{
  width:100%;
  padding:14px 16px;
  border:1.5px solid var(--line);
  border-radius:12px;
  background:var(--paper);
  font-size:1.1rem;
  font-family:inherit;
  color:var(--ink);
}
.input-area input:focus{outline:2px solid var(--tea); outline-offset:1px; border-color:var(--tea);}

.feedback-box{
  border-radius:12px;
  padding:16px 18px;
  margin-top:14px;
  font-size:0.92rem;
  line-height:1.5;
}
.feedback-box.ok{background:#E3ECE3; color:var(--tea-dark); border:1px solid var(--tea);}
.feedback-box.ko{background:#F4DCDC; color:var(--seal-dark); border:1px solid var(--seal);}
.feedback-box .fb-title{font-weight:800; display:flex; align-items:center; gap:6px; margin-bottom:6px;}
.feedback-box .solution-line{
  font-size:1.05rem;
  color:var(--ink);
  font-weight:600;
  margin-top:4px;
}

.selfcheck-buttons{
  display:flex;
  gap:10px;
  margin-top:14px;
}
.selfcheck-buttons button{
  flex:1;
  padding:13px;
  border-radius:10px;
  border:1.5px solid var(--line);
  font-weight:700;
  font-size:0.95rem;
  cursor:pointer;
  font-family:inherit;
  background:var(--paper);
  color:var(--ink);
}
.selfcheck-buttons .sc-ok{border-color:var(--tea); color:var(--tea-dark);}
.selfcheck-buttons .sc-ko{border-color:var(--seal); color:var(--seal-dark);}

.runner-footer{
  margin-top:auto;
  padding-top:18px;
}

/* Stamp animation for correct answers */
.stamp-pop{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.3) rotate(-12deg);
  width:120px;height:120px;
  border:5px solid var(--seal);
  border-radius:14px;
  color:var(--seal);
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;
  font-family:'Noto Serif SC',serif;
  background:rgba(247,241,227,0.92);
  opacity:0;
  pointer-events:none;
  z-index:999;
  transition:opacity 0.18s ease, transform 0.32s cubic-bezier(.34,1.56,.64,1);
}
.stamp-pop.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1) rotate(-8deg);
}

/* ---------- Flashcard ---------- */
.flashcard{
  background:var(--paper-dark);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:40px 22px;
  text-align:center;
  min-height:200px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  gap:10px;
}
.flashcard .fc-hanzi{font-size:3.4rem;}
.flashcard .fc-pinyin{font-size:1.1rem; color:var(--ink-soft);}
.flashcard .fc-meaning{font-size:1.2rem; color:var(--tea-dark); font-weight:700;}
.flashcard .fc-hint{font-size:0.78rem; color:var(--ink-soft); margin-top:10px;}

/* ---------- Result screen ---------- */
#screen-result{justify-content:center; padding:24px; text-align:center;}
.result-stamp{
  width:120px;height:120px;
  margin:0 auto 20px;
  border:4px solid var(--seal);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  color:var(--seal);
  font-size:3rem;
  font-family:'Noto Serif SC',serif;
  transform:rotate(-5deg);
}
.result-score{
  font-size:2.4rem;
  font-weight:800;
  color:var(--ink);
  margin:0 0 4px;
}
.result-sub{color:var(--ink-soft); margin-bottom:28px;}
.result-points{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--amber);
  color:#3A2A0A;
  padding:8px 16px;
  border-radius:999px;
  font-weight:700;
  margin-bottom:28px;
}

/* ---------- Leaderboard ---------- */
.lb-row{
  display:flex;
  align-items:center;
  gap:12px;
  padding:13px 16px;
  background:var(--paper-dark);
  border:1px solid var(--line);
  border-radius:12px;
  margin-bottom:8px;
}
.lb-rank{
  width:28px;height:28px;
  border-radius:50%;
  background:var(--line);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;
  font-size:0.85rem;
  flex-shrink:0;
}
.lb-row.me{border-color:var(--seal); background:#F9ECEC;}
.lb-row:nth-child(1) .lb-rank{background:var(--amber); color:#3A2A0A;}
.lb-name{flex:1; font-weight:600;}
.lb-pts{font-weight:800; color:var(--seal-dark);}

/* ---------- empty state ---------- */
.empty-state{
  text-align:center;
  padding:60px 24px;
  color:var(--ink-soft);
}
.empty-state .ic{font-size:2.4rem; margin-bottom:10px; display:block;}

footer.legal{
  text-align:center;
  font-size:0.7rem;
  color:var(--ink-soft);
  padding:10px;
  opacity:0.6;
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- LOGIN SCREEN -->
  <section class="screen active" id="screen-login">
    <div class="login-hero">
      <div class="stamp">夏</div>
      <h1>夏天去中国！</h1>
      <p>Carnet de voyage en Chine — 6e LVB</p>
    </div>
    <div class="login-card">
      <div id="login-mode-signin">
        <div class="field">
          <label for="li-name">Prénom</label>
          <input id="li-name" type="text" autocomplete="username" placeholder="Ton prénom">
        </div>
        <div class="field">
          <label for="li-pass">Mot de passe</label>
          <input id="li-pass" type="password" autocomplete="current-password" placeholder="••••••">
        </div>
        <div class="login-error" id="login-error"></div>
        <button class="btn btn-primary" id="btn-signin">Se connecter</button>
        <div class="login-toggle">Pas encore de compte ? <button id="go-signup">Créer un compte</button></div>
      </div>
      <div id="login-mode-signup" style="display:none;">
        <div class="field">
          <label for="su-name">Prénom</label>
          <input id="su-name" type="text" autocomplete="username" placeholder="Ton prénom">
        </div>
        <div class="field">
          <label for="su-pass">Mot de passe</label>
          <input id="su-pass" type="password" autocomplete="new-password" placeholder="Choisis un mot de passe">
        </div>
        <div class="field">
          <label for="su-pass2">Confirme le mot de passe</label>
          <input id="su-pass2" type="password" autocomplete="new-password" placeholder="••••••">
        </div>
        <div class="login-error" id="signup-error"></div>
        <button class="btn btn-primary" id="btn-signup">Créer mon compte</button>
        <div class="login-toggle">Déjà un compte ? <button id="go-signin">Se connecter</button></div>
      </div>
    </div>
  </section>

  <!-- HOME SCREEN -->
  <section class="screen" id="screen-home">
    <div class="home-header">
      <div class="greeting">你好, <span class="hanzi" id="home-username">朋友</span></div>
      <button class="icon-btn" id="btn-logout" aria-label="Se déconnecter" title="Se déconnecter">⎋</button>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <span class="num" id="stat-points">0</span>
        <span class="lbl">Points</span>
      </div>
      <div class="stat-card">
        <span class="num" id="stat-streak">0</span>
        <span class="lbl">Caractères vus</span>
      </div>
      <div class="stat-card">
        <span class="num" id="stat-exos">0</span>
        <span class="lbl">Exercices faits</span>
      </div>
    </div>

    <div class="section-label">Explorer</div>
    <div class="mode-cards">
      <button class="mode-card tea" id="card-vocab">
        <div class="ic">字</div>
        <div class="txt">
          <h3>Réviser les caractères</h3>
          <p>16 catégories · QCM, saisie, flashcards</p>
        </div>
      </button>
      <button class="mode-card seal" id="card-cahier">
        <div class="ic">📖</div>
        <div class="txt">
          <h3>Cahier de vacances</h3>
          <p>8 chapitres · le voyage de Wang Xiaolong</p>
        </div>
      </button>
    </div>

    <div class="section-label">Classement</div>
    <div class="mode-cards" style="padding-top:0;">
      <button class="mode-card" id="card-leaderboard" style="background:var(--paper-dark);">
        <div class="ic" style="background:#EFE0BD;color:var(--amber-dark);">🏆</div>
        <div class="txt">
          <h3>Voir le classement</h3>
          <p>Compare tes points avec les autres comptes</p>
        </div>
      </button>
    </div>
  </section>

  <!-- VOCAB CATEGORY LIST -->
  <section class="screen" id="screen-vocab-list">
    <div class="topbar">
      <button class="back-btn" data-back="screen-home" aria-label="Retour">←</button>
      <div class="title">Caractères 字</div>
      <div class="score-pill">🏮 <span id="vocab-score-pill">0</span></div>
    </div>
    <div class="list-wrap" id="vocab-list-wrap"></div>
  </section>

  <!-- VOCAB MODE CHOICE -->
  <section class="screen" id="screen-vocab-mode">
    <div class="topbar">
      <button class="back-btn" data-back="screen-vocab-list" aria-label="Retour">←</button>
      <div class="title" id="vocab-mode-title">Catégorie</div>
      <div style="width:40px;"></div>
    </div>
    <div class="list-wrap">
      <button class="list-item" data-mode="qcm">
        <div class="badge">A</div>
        <div class="info"><h4>QCM</h4><div class="sub">Choisis le bon sens parmi 4 propositions</div></div>
      </button>

<script>
// ===================== STORAGE HELPERS (Firebase Firestore) =====================
// Simple obfuscation for passwords (NOT real security - just avoids plaintext storage)
function hashPass(pass){
  let h = 0;
  for(let i=0;i<pass.length;i++){ h = (h*31 + pass.charCodeAt(i)) >>> 0; }
  return 'h' + h.toString(36) + pass.length;
}

// Firestore doesn't allow ':' or '/' cleanly as doc IDs in all cases, so we sanitize.
function sanitizeKey(key){
  return key.replace(/[:/]/g, '__');
}

async function storageGet(key, shared){
  try{
    const docRef = window.fb.doc(window.fb.db, 'app_storage', sanitizeKey(key));
    const snap = await window.fb.getDoc(docRef);
    return snap.exists() ? snap.data().value : null;
  }catch(e){ console.error('storage get failed', e); return null; }
}
async function storageSet(key, value, shared){
  try{
    const docRef = window.fb.doc(window.fb.db, 'app_storage', sanitizeKey(key));
    await window.fb.setDoc(docRef, { key: key, value: value, updatedAt: Date.now() });
    return true;
  }catch(e){ console.error('storage set failed', e); return false; }
}
async function storageListKeys(prefix, shared){
  try{
    const colRef = window.fb.collection(window.fb.db, 'app_storage');
    const snap = await window.fb.getDocs(colRef);
    const keys = [];
    snap.forEach(d=>{
      const data = d.data();
      if(!prefix || (data.key && data.key.startsWith(prefix))) keys.push(data.key);
    });
    return keys;
  }catch(e){ console.error('storage list failed', e); return []; }
}

// ===================== APP STATE =====================
const state = {
  user: null,           // { name, points, exosDone, wordsSeen, charScores: {catId:{...}} }
  currentVocabCat: null,
  currentMode: null,     // qcm | input | flash
  currentChapter: null,
  currentExercise: null,
  runner: {
    items: [],
    index: 0,
    correctCount: 0,
    pointsEarned: 0,
    mode: null,          // qcm | input | flash | selfcheck
    sourceLabel: ''
  }
};

// ===================== NAVIGATION =====================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
document.querySelectorAll('[data-back]').forEach(btn=>{
  btn.addEventListener('click', ()=> showScreen(btn.getAttribute('data-back')));
});

// Guards against the (rare, sub-100ms) race where a user clicks before the
// Firebase ES module has finished its async initialization.
function waitForFirebase(timeoutMs){
  if(window.fbReady) return Promise.resolve(true);
  return new Promise(resolve=>{
    const t = setTimeout(()=>resolve(!!window.fbReady), timeoutMs || 4000);
    window.addEventListener('fb-ready', ()=>{ clearTimeout(t); resolve(true); }, {once:true});
  });
}

// ===================== AUTH =====================
const loginError = document.getElementById('login-error');
const signupError = document.getElementById('signup-error');

document.getElementById('go-signup').addEventListener('click', ()=>{
  document.getElementById('login-mode-signin').style.display='none';
  document.getElementById('login-mode-signup').style.display='block';
});
document.getElementById('go-signin').addEventListener('click', ()=>{
  document.getElementById('login-mode-signup').style.display='none';
  document.getElementById('login-mode-signin').style.display='block';
});

document.getElementById('btn-signup').addEventListener('click', async ()=>{
  const name = document.getElementById('su-name').value.trim();
  const pass = document.getElementById('su-pass').value;
  const pass2 = document.getElementById('su-pass2').value;
  signupError.textContent = '';

  if(!name){ signupError.textContent = 'Choisis un prénom.'; return; }
  if(!pass || pass.length < 4){ signupError.textContent = 'Le mot de passe doit avoir au moins 4 caractères.'; return; }
  if(pass !== pass2){ signupError.textContent = 'Les mots de passe ne correspondent pas.'; return; }

  signupError.textContent = 'Connexion au serveur...';
  const fbOk = await waitForFirebase();
  signupError.textContent = '';
  if(!fbOk){ signupError.textContent = 'Le serveur ne répond pas. Vérifie ta connexion internet et réessaie.'; return; }

  const key = 'user:' + name.toLowerCase();
  const existing = await storageGet(key, true);
  if(existing){ signupError.textContent = 'Ce prénom est déjà utilisé. Choisis-en un autre ou connecte-toi.'; return; }

  const newUser = {
    name: name,
    passHash: hashPass(pass),
    points: 0,
    exosDone: 0,
    wordsSeen: 0,
    charScores: {},
    createdAt: Date.now()
  };
  const ok = await storageSet(key, newUser, true);
  if(!ok){ signupError.textContent = "Erreur de connexion au serveur, réessaie."; return; }
  state.user = newUser;
  enterApp();
});

document.getElementById('btn-signin').addEventListener('click', async ()=>{
  const name = document.getElementById('li-name').value.trim();
  const pass = document.getElementById('li-pass').value;
  loginError.textContent = '';
  if(!name || !pass){ loginError.textContent = 'Entre ton prénom et ton mot de passe.'; return; }

  loginError.textContent = 'Connexion au serveur...';
  const fbOk = await waitForFirebase();
  loginError.textContent = '';
  if(!fbOk){ loginError.textContent = 'Le serveur ne répond pas. Vérifie ta connexion internet et réessaie.'; return; }

  const key = 'user:' + name.toLowerCase();
  const existing = await storageGet(key, true);
  if(!existing){ loginError.textContent = "Aucun compte avec ce prénom. Crée-en un d'abord."; return; }
  if(existing.passHash !== hashPass(pass)){ loginError.textContent = 'Mot de passe incorrect.'; return; }

  state.user = existing;
  enterApp();
});

document.getElementById('btn-logout').addEventListener('click', ()=>{
  state.user = null;
  document.getElementById('li-name').value='';
  document.getElementById('li-pass').value='';
  document.getElementById('login-mode-signup').style.display='none';
  document.getElementById('login-mode-signin').style.display='block';
  showScreen('screen-login');
});

async function persistUser(){
  if(!state.user) return;
  const key = 'user:' + state.user.name.toLowerCase();
  await storageSet(key, state.user, true);
}

function enterApp(){
  refreshHomeStats();
  showScreen('screen-home');
}

// ===================== HOME =====================
function refreshHomeStats(){
  document.getElementById('home-username').textContent = state.user.name;
  document.getElementById('stat-points').textContent = state.user.points;
  document.getElementById('stat-streak').textContent = state.user.wordsSeen;
  document.getElementById('stat-exos').textContent = state.user.exosDone;
  document.getElementById('vocab-score-pill').textContent = state.user.points;
  document.getElementById('cahier-score-pill').textContent = state.user.points;
}

document.getElementById('card-vocab').addEventListener('click', ()=>{
  renderVocabList();
  showScreen('screen-vocab-list');
});
document.getElementById('card-cahier').addEventListener('click', ()=>{
  renderCahierList();
  showScreen('screen-cahier-list');
});
document.getElementById('card-leaderboard').addEventListener('click', async ()=>{
  await renderLeaderboard();
  showScreen('screen-leaderboard');
});

// ===================== VOCAB LIST =====================
function catProgress(catId){
  const sc = state.user.charScores[catId];
  if(!sc) return {done:0, total: VOCAB_CATEGORIES.find(c=>c.id===catId).words.length};
  return {done: sc.bestSeen || 0, total: VOCAB_CATEGORIES.find(c=>c.id===catId).words.length};
}

function renderVocabList(){
  const wrap = document.getElementById('vocab-list-wrap');
  wrap.innerHTML = '';
  VOCAB_CATEGORIES.forEach((cat, i)=>{
    const prog = catProgress(cat.id);
    const done = prog.done >= prog.total;
    const btn = document.createElement('button');
    btn.className = 'list-item' + (done ? ' done' : '');
    btn.innerHTML = `
      <div class="badge">${i+1}</div>
      <div class="info">
        <h4>${cat.title}</h4>
        <div class="sub">${cat.words.length} caractères</div>
      </div>
      <div class="progress-mini">${done ? '✓ Maîtrisé' : ''}</div>
    `;
    btn.addEventListener('click', ()=>{
      state.currentVocabCat = cat;
      document.getElementById('vocab-mode-title').textContent = cat.title;
      showScreen('screen-vocab-mode');
    });
    wrap.appendChild(btn);
  });
}

document.querySelectorAll('#screen-vocab-mode .list-item').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const mode = btn.getAttribute('data-mode');
    startVocabExercise(state.currentVocabCat, mode);
  });
});

// ===================== CAHIER LIST =====================
function chapterProgress(chapId){
  const sc = state.user.charScores['cahier:'+chapId];
  const chap = CAHIER_CHAPTERS.find(c=>c.id===chapId);
  const totalExos = chap.exercises.length;
  const done = sc ? (sc.exosDone || 0) : 0;
  return {done, total: totalExos};
}

function renderCahierList(){
  const wrap = document.getElementById('cahier-list-wrap');
  wrap.innerHTML = '';
  CAHIER_CHAPTERS.forEach((chap, i)=>{
    const prog = chapterProgress(chap.id);
    const complete = prog.done >= prog.total;
    const btn = document.createElement('button');
    btn.className = 'list-item' + (complete ? ' done' : '');
    btn.innerHTML = `
      <div class="badge">${i+1}</div>
      <div class="info">
        <h4>${chap.title}</h4>
        <div class="sub">${chap.subtitle} · ${chap.exercises.length} exercices</div>
      </div>
      <div class="progress-mini">${prog.done}/${prog.total}</div>
    `;
    btn.addEventListener('click', ()=>{
      state.currentChapter = chap;
      renderChapterExercises(chap);
      showScreen('screen-chapter');
    });
    wrap.appendChild(btn);
  });
}

function renderChapterExercises(chap){
  document.getElementById('chapter-banner-cn').textContent = chap.subtitle;
  document.getElementById('chapter-banner-fr').textContent = chap.title;
  const wrap = document.getElementById('chapter-exo-wrap');
  wrap.innerHTML = '';
  const chapKey = 'cahier:'+chap.id;
  const sc = state.user.charScores[chapKey] || {};
  const exoDoneSet = sc.exoIds || [];

  chap.exercises.forEach((exo, i)=>{
    const isDone = exoDoneSet.includes(exo.id);
    const btn = document.createElement('button');
    btn.className = 'list-item' + (isDone ? ' done' : '');
    const typeLabel = exo.type === 'qcm' ? 'QCM' : 'Auto-correction';
    btn.innerHTML = `
      <div class="badge">${i+1}</div>
      <div class="info">
        <h4>${exo.title}</h4>
        <div class="sub">${exo.items.length} questions <span class="chip">${typeLabel}</span></div>
      </div>
      <div class="progress-mini">${isDone ? '✓' : ''}</div>
    `;
    btn.addEventListener('click', ()=> startCahierExercise(chap, exo));
    wrap.appendChild(btn);
  });
}

// ===================== STAMP ANIMATION =====================
function popStamp(symbol){
  const el = document.getElementById('stamp-pop');
  el.textContent = symbol;
  el.classList.add('show');
  setTimeout(()=> el.classList.remove('show'), 650);
}

// ===================== VOCAB EXERCISE RUNNER =====================
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startVocabExercise(cat, mode){
  state.runner = {
    items: shuffle(cat.words),
    index: 0,
    correctCount: 0,
    pointsEarned: 0,
    mode: mode,
    sourceLabel: cat.title,
    catId: cat.id
  };
  document.getElementById('runner-title').textContent = cat.title;
  document.getElementById('runner-exit').onclick = ()=> exitRunner('screen-vocab-mode');
  renderRunnerStep();
  showScreen('screen-runner');
}

function exitRunner(target){
  showScreen(target);
}

function renderRunnerCounter(){
  const {index, items} = state.runner;
  document.getElementById('runner-counter').textContent = `Question ${Math.min(index+1, items.length)} / ${items.length}`;
  document.getElementById('runner-progress').style.width = (index/items.length*100) + '%';
}

function renderRunnerStep(){
  const r = state.runner;
  // Cahier exercises (qcm/selfcheck tied to a chapter) route to the dedicated renderer
  if(r.chapId){ renderRunnerStep2(); return; }

  if(r.index >= r.items.length){
    finishRunner();
    return;
  }
  renderRunnerCounter();
  const body = document.getElementById('runner-body');
  const footer = document.getElementById('runner-footer');
  footer.innerHTML = '';
  const word = r.items[r.index];

  if(r.mode === 'qcm'){
    renderVocabQCM(word, body, footer);
  } else if(r.mode === 'input'){
    renderVocabInput(word, body, footer);
  } else if(r.mode === 'flash'){
    renderVocabFlash(word, body, footer);
  }
}

function renderVocabQCM(word, body, footer){
  const cat = state.currentVocabCat;
  const distractors = shuffle(cat.words.filter(w=>w.c!==word.c)).slice(0,3).map(w=>w.m);
  const options = shuffle([word.m, ...distractors]);

  body.innerHTML = `
    <div class="prompt-card"><div class="big-hanzi hanzi">${word.c}</div></div>
    <div class="options-grid" id="opt-grid"></div>
  `;
  const grid = document.getElementById('opt-grid');
  options.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = opt;
    b.addEventListener('click', ()=>{
      const correct = opt === word.m;
      document.querySelectorAll('#opt-grid .opt-btn').forEach(o=>{
        o.disabled = true;
        if(o.textContent === word.m) o.classList.add('correct');
        else if(o === b && !correct) o.classList.add('wrong');
      });
      handleAnswer(correct, `${word.c} (${word.p}) signifie « ${word.m} ».`);
    });
    grid.appendChild(b);
  });
}

function renderVocabInput(word, body, footer){
  body.innerHTML = `
    <div class="prompt-card">
      <div>
        <div class="big-hanzi hanzi" style="margin-bottom:8px;">${word.c}</div>
        <div style="font-size:0.85rem;color:var(--ink-soft);">Écris le pinyin</div>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="vocab-input" placeholder="ex : nǐ hǎo" autocomplete="off" autocapitalize="off" autocorrect="off">
      <button class="btn btn-primary" id="vocab-input-submit">Valider</button>
    </div>
    <div id="vocab-input-feedback"></div>
  `;
  const input = document.getElementById('vocab-input');
  input.focus();
  const submit = ()=>{
    const val = normalizeAnswer(input.value);
    const target = normalizeAnswer(word.p);
    const correct = val.length>0 && val === target;
    document.getElementById('vocab-input-submit').disabled = true;
    input.disabled = true;
    const fb = document.getElementById('vocab-input-feedback');
    fb.innerHTML = `
      <div class="feedback-box ${correct?'ok':'ko'}">
        <div class="fb-title">${correct? '✅ Correct !' : '❌ Pas tout à fait'}</div>
        <div class="solution-line">${word.c} se dit <strong>${word.p}</strong> et signifie « ${word.m} ».</div>
      </div>
    `;
    showRunnerNext(correct);
  };
  document.getElementById('vocab-input-submit').addEventListener('click', submit);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
}

function normalizeAnswer(s){
  return s.trim().toLowerCase()
    .replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i')
    .replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'u')
    .replace(/\s+/g,'');
}

function renderVocabFlash(word, body, footer){
  body.innerHTML = `
    <div class="flashcard" id="flash-card">
      <div class="fc-hanzi hanzi">${word.c}</div>
      <div class="fc-hint">Touche la carte pour voir la réponse</div>
    </div>
    <div class="selfcheck-buttons" id="flash-buttons" style="display:none;">
      <button class="sc-ko" id="flash-ko">😕 Je ne savais pas</button>
      <button class="sc-ok" id="flash-ok">✅ Je savais</button>
    </div>
  `;
  const card = document.getElementById('flash-card');
  card.addEventListener('click', ()=>{
    card.innerHTML = `
      <div class="fc-pinyin">${word.p}</div>
      <div class="fc-meaning">${word.m}</div>
    `;
    document.getElementById('flash-buttons').style.display = 'flex';
  }, {once:true});

  body.querySelector('#flash-buttons').addEventListener('click', (e)=>{
    if(e.target.id === 'flash-ok'){ handleAnswer(true, null); }
    else if(e.target.id === 'flash-ko'){ handleAnswer(false, `${word.c} (${word.p}) : « ${word.m} »`); }
  });
}

function showRunnerNext(correct){
  const footer = document.getElementById('runner-footer');
  footer.innerHTML = `<button class="btn btn-primary" id="next-step-btn">${state.runner.index+1>=state.runner.items.length ? 'Voir le résultat' : 'Question suivante'}</button>`;
  document.getElementById('next-step-btn').addEventListener('click', ()=>{
    state.runner.index++;
    renderRunnerStep();
  });
}

function handleAnswer(correct, explanationText){
  const r = state.runner;
  if(correct){
    r.correctCount++;
    r.pointsEarned += 10;
    popStamp('好');
  }
  if(state.runner.mode !== 'flash' && state.runner.mode !== 'input'){
    // QCM path: show inline feedback then next button
    const body = document.getElementById('runner-body');
    const fb = document.createElement('div');
    fb.className = 'feedback-box ' + (correct ? 'ok' : 'ko');
    fb.innerHTML = `<div class="fb-title">${correct ? '✅ Correct !' : '❌ Pas tout à fait'}</div><div class="solution-line">${explanationText}</div>`;
    body.appendChild(fb);
  }
  // bump word-seen counter live (don't double count for flash, counted separately)
  state.user.wordsSeen = (state.user.wordsSeen||0) + (state.runner.mode!=='flash' ? 1 : 0);
  showRunnerNext(correct);
}

async function finishRunner(){
  const r = state.runner;
  const total = r.items.length;
  const pct = total ? Math.round((r.correctCount/total)*100) : 0;

  // Update category mastery for vocab mode
  if(r.catId){
    const key = r.catId;
    const prev = state.user.charScores[key] || {bestSeen:0};
    if(r.correctCount > (prev.bestSeen||0)){
      prev.bestSeen = r.correctCount;
    }
    if(r.correctCount === total){
      prev.bestSeen = total;
    }
    state.user.charScores[key] = prev;
    state.user.wordsSeen = (state.user.wordsSeen||0); // already incremented per-answer
  }

  state.user.points += r.pointsEarned;
  state.user.exosDone = (state.user.exosDone||0) + 1;
  await persistUser();
  refreshHomeStats();

  document.getElementById('result-score').textContent = `${r.correctCount} / ${total}`;
  document.getElementById('result-points-num').textContent = r.pointsEarned;
  document.getElementById('result-stamp').textContent = pct === 100 ? '满分' : (pct >= 70 ? '好' : '加油');
  document.getElementById('result-sub').textContent =
    pct === 100 ? 'Parfait ! Tu maîtrises cette série.' :
    pct >= 70 ? 'Bien joué, continue comme ça !' :
    'Continue à t\'entraîner, tu vas y arriver.';

  document.getElementById('result-continue').onclick = ()=>{
    if(r.catId) { renderVocabList(); showScreen('screen-vocab-list'); }
    else { renderCahierList(); showScreen('screen-cahier-list'); }
  };
  document.getElementById('result-retry').onclick = ()=>{
    if(r.catId) startVocabExercise(state.currentVocabCat, r.mode);
    else startCahierExercise(state.currentChapter, state.currentExercise);
  };

  showScreen('screen-result');
}

// ===================== CAHIER EXERCISE RUNNER (selfcheck + qcm) =====================
function startCahierExercise(chap, exo){
  state.currentExercise = exo;
  state.runner = {
    items: exo.items.map((it,i)=>({...it, _i:i})),
    index: 0,
    correctCount: 0,
    pointsEarned: 0,
    mode: exo.type,
    sourceLabel: exo.title,
    chapId: chap.id,
    exoId: exo.id
  };
  document.getElementById('runner-title').textContent = exo.title;
  document.getElementById('runner-exit').onclick = ()=>{
    renderChapterExercises(chap);
    showScreen('screen-chapter');
  };
  renderRunnerStep2();
  showScreen('screen-runner');
}

function renderRunnerStep2(){
  const r = state.runner;
  if(r.mode === 'qcm' || r.mode === 'selfcheck'){
    if(r.index >= r.items.length){ finishCahierRunner(); return; }
    renderRunnerCounter();
    const body = document.getElementById('runner-body');
    const footer = document.getElementById('runner-footer');
    footer.innerHTML = '';
    const item = r.items[r.index];
    if(r.mode === 'qcm') renderCahierQCM(item, body, footer);
    else renderCahierSelfcheck(item, body, footer);
  }
}
function renderCahierQCM(item, body, footer){
  body.innerHTML = `
    <div class="prompt-card"><div class="sentence hanzi">${item.prompt}</div></div>
    <div class="options-grid" id="opt-grid"></div>
  `;
  const grid = document.getElementById('opt-grid');
  const optionOrder = item.options.map((opt,i)=>({opt,i}));
  shuffle(optionOrder).forEach(({opt,i})=>{
    const b = document.createElement('button');
    b.className = 'opt-btn hanzi';
    b.textContent = opt;
    b.addEventListener('click', ()=>{
      const correct = i === item.answer;
      document.querySelectorAll('#opt-grid .opt-btn').forEach((o,idx)=>{
        o.disabled = true;
      });
      // mark correct/wrong by re-deriving original index via text match
      document.querySelectorAll('#opt-grid .opt-btn').forEach(o=>{
        if(o.textContent === item.options[item.answer]) o.classList.add('correct');
        else if(o === b && !correct) o.classList.add('wrong');
      });
      const body2 = document.getElementById('runner-body');
      const fb = document.createElement('div');
      fb.className = 'feedback-box ' + (correct ? 'ok' : 'ko');
      fb.innerHTML = `<div class="fb-title">${correct ? '✅ Correct !' : '❌ Pas tout à fait'}</div><div class="solution-line">${item.explanation}</div>`;
      body2.appendChild(fb);
      handleCahierAnswer(correct);
    });
    grid.appendChild(b);
  });
}

function renderCahierSelfcheck(item, body, footer){
  body.innerHTML = `
    <div class="prompt-card"><div class="sentence hanzi">${item.prompt}</div></div>
    <div class="input-area">
      <input type="text" id="sc-input" placeholder="Écris ta réponse en chinois..." autocomplete="off">
      <button class="btn btn-primary" id="sc-reveal">Voir la solution</button>
    </div>
    <div id="sc-feedback"></div>
  `;
  document.getElementById('sc-input').focus();
  document.getElementById('sc-reveal').addEventListener('click', ()=>{
    document.getElementById('sc-input').disabled = true;
    document.getElementById('sc-reveal').disabled = true;
    const fb = document.getElementById('sc-feedback');
    fb.innerHTML = `
      <div class="feedback-box ok">
        <div class="fb-title">💡 Solution proposée</div>
        <div class="solution-line hanzi">${item.solution}</div>
      </div>
      <div class="selfcheck-buttons">
        <button class="sc-ko" id="sc-wrong-btn">😕 J'étais loin</button>
        <button class="sc-ok" id="sc-right-btn">✅ J'avais juste / presque</button>
      </div>
    `;
    document.getElementById('sc-right-btn').addEventListener('click', ()=> handleCahierAnswer(true));
    document.getElementById('sc-wrong-btn').addEventListener('click', ()=> handleCahierAnswer(false));
  });
}

function handleCahierAnswer(correct){
  const r = state.runner;
  if(correct){ r.correctCount++; r.pointsEarned += 10; popStamp('好'); }
  const footer = document.getElementById('runner-footer');
  footer.innerHTML = `<button class="btn btn-primary" id="next-step-btn">${r.index+1>=r.items.length ? 'Voir le résultat' : 'Question suivante'}</button>`;
  document.getElementById('next-step-btn').addEventListener('click', ()=>{
    r.index++;
    renderRunnerStep2();
  });
}

async function finishCahierRunner(){
  const r = state.runner;
  const total = r.items.length;
  const pct = total ? Math.round((r.correctCount/total)*100) : 0;

  const chapKey = 'cahier:'+r.chapId;
  const prev = state.user.charScores[chapKey] || {exosDone:0, exoIds:[]};
  if(!prev.exoIds.includes(r.exoId)){
    prev.exoIds.push(r.exoId);
    prev.exosDone = prev.exoIds.length;
  }
  state.user.charScores[chapKey] = prev;

  state.user.points += r.pointsEarned;
  state.user.exosDone = (state.user.exosDone||0) + 1;
  await persistUser();
  refreshHomeStats();

  document.getElementById('result-score').textContent = `${r.correctCount} / ${total}`;
  document.getElementById('result-points-num').textContent = r.pointsEarned;
  document.getElementById('result-stamp').textContent = pct === 100 ? '满分' : (pct >= 70 ? '好' : '加油');
  document.getElementById('result-sub').textContent =
    pct === 100 ? 'Parfait ! Tu maîtrises cet exercice.' :
    pct >= 70 ? 'Bien joué, continue comme ça !' :
    'Continue à t\'entraîner, tu vas y arriver.';

  document.getElementById('result-continue').onclick = ()=>{
    renderChapterExercises(state.currentChapter);
    showScreen('screen-chapter');
  };
  document.getElementById('result-retry').onclick = ()=>{
    startCahierExercise(state.currentChapter, state.currentExercise);
  };

  showScreen('screen-result');
}

// ===================== LEADERBOARD =====================
async function renderLeaderboard(){
  const wrap = document.getElementById('leaderboard-wrap');
  wrap.innerHTML = '<div class="empty-state"><span class="ic">⏳</span>Chargement du classement…</div>';
  const keys = await storageListKeys('user:', true);
  const users = [];
  for(const k of keys){
    const u = await storageGet(k, true);
    if(u) users.push(u);
  }
  users.sort((a,b)=> (b.points||0) - (a.points||0));

  wrap.innerHTML = '';
  if(users.length === 0){
    wrap.innerHTML = '<div class="empty-state"><span class="ic">🏮</span>Aucun joueur pour le moment.</div>';
    return;
  }
  users.forEach((u, i)=>{
    const row = document.createElement('div');
    row.className = 'lb-row' + (state.user && u.name === state.user.name ? ' me' : '');
    row.innerHTML = `
      <div class="lb-rank">${i+1}</div>
      <div class="lb-name">${u.name}${state.user && u.name===state.user.name ? ' (toi)' : ''}</div>
      <div class="lb-pts">${u.points||0} pts</div>
    `;
    wrap.appendChild(row);
  });
}

</script>
